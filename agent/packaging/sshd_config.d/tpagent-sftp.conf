# Installé dans /etc/ssh/sshd_config.d/ par packaging/install.sh.
# S'applique uniquement aux comptes élèves (groupe tp-students, ajouté par
# tpagent-create-linux-user.sh) : accès SFTP uniquement, confiné à leur
# home_dir (voir docs/security.md pour le schéma d'ownership requis).
Match Group tp-students
    ChrootDirectory %h
    ForceCommand internal-sftp
    AllowTcpForwarding no
    X11Forwarding no
    PermitTunnel no
