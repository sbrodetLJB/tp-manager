# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    annotations: false
    http_method_override: false
    handle_all_throwables: true
    csrf_protection: true

    # Permet de monter le dashboard sous un sous-chemin derrière un reverse-proxy (ex. Apache
    # ProxyPass /tp-manager -> ce dashboard) : on fait confiance à X-Forwarded-Prefix (et aux
    # en-têtes X-Forwarded-* usuels) uniquement depuis la machine locale, pour que path()/url()
    # génèrent des liens corrects sous ce préfixe. Voir dashboard-ecole (autre dépôt) pour un
    # exemple de déploiement l'utilisant.
    trusted_proxies: '127.0.0.1,::1'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port', 'x-forwarded-prefix']

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax

    #esi: true
    #fragments: true
    php_errors:
        log: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
